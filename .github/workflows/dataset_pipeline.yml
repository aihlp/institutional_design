name: Dataset Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      dataset_type:
        description: 'Dataset type (synthetic, reddit, wikipedia, github)'
        required: true
        default: 'synthetic'
        type: choice
        options:
          - synthetic
          - reddit
          - wikipedia
          - github
      scenario:
        description: 'Scenario for synthetic data'
        required: false
        default: 'baseline'
        type: choice
        options:
          - baseline
          - intervention
          - drift
      num_events:
        description: 'Number of events to process'
        required: false
        default: '500'
        type: string

jobs:
  run-experiment:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml numpy matplotlib requests
      
      - name: Run experiment
        env:
          DATASET_TYPE: ${{ github.event.inputs.dataset_type || 'synthetic' }}
          SCENARIO: ${{ github.event.inputs.scenario || 'baseline' }}
          NUM_EVENTS: ${{ github.event.inputs.num_events || '500' }}
        run: |
          python experiments/run_experiment.py \
            --dataset $DATASET_TYPE \
            --scenario $SCENARIO \
            --events $NUM_EVENTS \
            --output experiments/output
      
      - name: Upload experiment results
        uses: actions/upload-artifact@v4
        with:
          name: experiment-results
          path: |
            experiments/output/*.json
            visualizations/*.json
          retention-days: 30
      
      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-output
          path: experiments/output/benchmark_output.json
          retention-days: 90
      
      - name: Display summary
        run: |
          echo "## Experiment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Dataset: $DATASET_TYPE" >> $GITHUB_STEP_SUMMARY
          echo "- Scenario: $SCENARIO" >> $GITHUB_STEP_SUMMARY
          echo "- Events: $NUM_EVENTS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output Files" >> $GITHUB_STEP_SUMMARY
          ls -la experiments/output/ >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
          cat experiments/output/benchmark_output.json >> $GITHUB_STEP_SUMMARY
